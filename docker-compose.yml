services:
  fastgs:
    build:
      context: .
      dockerfile: Dockerfile.speedysplat
    container_name: fastgs_trainer
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
    volumes:
      - ./uploads:/workspace/data/input
      - ./output:/workspace/data/output
      - ./scripts:/workspace/scripts
    command: ["/bin/bash", "/workspace/scripts/run_speedysplat.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
